name: Android Lite Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-lite-apk:
    name: Build Expenser Lite APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rn-lite/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: rn-lite
        run: npm ci

      - name: Test release keystore decoder
        working-directory: rn-lite
        run: npm test -- __tests__/decodeAndroidKeystore.test.js --runInBand

      - name: Detect release signing secrets
        id: signing
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && \
             [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] && \
             [ -n "${ANDROID_KEY_ALIAS:-}" ] && \
             [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "use_release_signing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::Release signing secrets are missing. Building the Lite APK with the debug keystore fallback."
          echo "use_release_signing=false" >> "$GITHUB_OUTPUT"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Decode release keystore
        if: steps.signing.outputs.use_release_signing == 'true'
        working-directory: rn-lite
        run: node scripts/decodeAndroidKeystore.js android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Validate release signing config
        if: steps.signing.outputs.use_release_signing == 'true'
        working-directory: rn-lite
        run: node scripts/validateAndroidSigning.js android/app/release.keystore
        env:
          ANDROID_KEYSTORE_FILE: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build release APK with release signing
        if: steps.signing.outputs.use_release_signing == 'true'
        working-directory: rn-lite/android
        run: ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_FILE: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build release APK with debug signing fallback
        if: steps.signing.outputs.use_release_signing != 'true'
        working-directory: rn-lite/android
        run: ./gradlew assembleRelease

      - name: Rename APK
        working-directory: rn-lite
        run: cp android/app/build/outputs/apk/release/app-release.apk "expenser-lite-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rn-lite/expenser-lite-${{ github.ref_name }}.apk
